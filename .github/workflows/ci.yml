name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: python -m pytest

      - name: Self-test
        run: miv self-test

      - name: Dry run
        run: |
          set +e
          miv verify --dry-run
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ]; then
            exit "$code"
          fi

      - name: Build package
        if: matrix.python-version == '3.12'
        run: python -m build
